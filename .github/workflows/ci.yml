name: CI\n\non:\n  push:\n    branches: [master, main]\n  pull_request:\n    branches: [master, main]\n\nconcurrency:\n  group: ${{ github.workflow }}-${{ github.ref }}\n  cancel-in-progress: true\n\njobs:\n  build_and_test_linux:\n    name: Build and Test (Linux ${{ matrix.compiler }})\n    runs-on: ubuntu-latest\n    strategy:\n      fail-fast: false\n      matrix:\n        compiler: [gcc, clang]\n    steps:\n      - name: Checkout repository\n        uses: actions/checkout@v4\n\n      - name: Install dependencies\n        run: |\n          sudo apt-get update\n          sudo apt-get install -y libcups2-dev ninja-build cmake cups-filters\n\n      - name: Build and Test (${{ matrix.compiler }})\n        run: cmake --workflow --preset ${{ matrix.compiler }}-ci\n\n      - name: Upload build artifacts\n        uses: actions/upload-artifact@v4\n        with:\n          name: build_${{ matrix.compiler }}_ci\n          path: build/${{ matrix.compiler }}-ci/\n\n  lint_and_format:\n    name: Lint and Format\n    runs-on: ubuntu-latest\n    steps:\n      - name: Checkout repository\n        uses: actions/checkout@v4\n\n      - name: Install tools\n        run: |\n          sudo apt-get update\n          sudo apt-get install -y clang-format clang-tidy cmake ninja-build libcups2-dev\n\n      - name: Configure (GCC for compile_commands.json)\n        run: cmake --preset gcc-ci\n\n      - name: Check formatting\n        run: cmake --build build/gcc-ci --target clang_format_check\n\n      - name: Run static analysis\n        run: cmake --build build/gcc-ci --target clang_tidy\n