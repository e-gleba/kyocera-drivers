name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_test_linux:
    name: Build and Test (Linux ${{ matrix.compiler }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcups2-dev ninja-build cmake cups-filters

      - name: Configure (${{ matrix.compiler }})
        run: |
          cmake --preset ${{ matrix.compiler }} \
                -DINSTALL_ORIGINAL_PROPRIETARY_DRIVERS=OFF \
                -DBUILD_TESTS=ON

      - name: Build (${{ matrix.compiler }})
        run: cmake --build --preset ${{ matrix.compiler }}

      - name: Test (${{ matrix.compiler }})
        run: ctest --preset ${{ matrix.compiler }} --output-on-failure

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build_${{ matrix.compiler }}
          path: build/${{ matrix.compiler }}/

  lint_and_format:
    name: Lint and Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format clang-tidy cmake ninja-build libcups2-dev

      - name: Configure (GCC for compile_commands.json)
        run: |
          cmake --preset gcc \
                -DINSTALL_ORIGINAL_PROPRIETARY_DRIVERS=OFF \
                -DBUILD_TESTS=ON

      - name: Check formatting
        run: cmake --build build/gcc --target clang_format_check

      - name: Run static analysis
        run: cmake --build build/gcc --target clang_tidy
